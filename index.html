<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AutoSkill 테스트 페이지 - GitHub Pages + Firebase Firestore 연동">
  <title>AutoSkill 테스트</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .badge {
      display: inline-block;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      color: #1a1a1a;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.25rem 0.75rem;
      border-radius: 100px;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
    p.sub { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-bottom: 2rem; }

    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.8rem; color: rgba(255,255,255,0.6); margin-bottom: 0.4rem; }
    input, textarea {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus, textarea:focus {
      border-color: #f7971e;
      background: rgba(247,151,30,0.06);
    }
    textarea { resize: vertical; min-height: 80px; }

    .btn {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 0.5rem;
    }
    .btn-primary {
      background: linear-gradient(90deg, #f7971e, #ffd200);
      color: #1a1a1a;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(247,151,30,0.4); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.1);
      margin-top: 0.5rem;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.13); }

    #status {
      margin-top: 1.25rem;
      padding: 0.85rem 1.1rem;
      border-radius: 10px;
      font-size: 0.88rem;
      display: none;
    }
    #status.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    #status.error   { background: rgba(239,68,68,0.15);  border: 1px solid rgba(239,68,68,0.3);  color: #fca5a5; }
    #status.loading { background: rgba(251,191,36,0.1);  border: 1px solid rgba(251,191,36,0.25); color: #fde68a; }

    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 1.5rem 0; }

    h2 { font-size: 1rem; margin-bottom: 1rem; color: rgba(255,255,255,0.7); }
    #data-list { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
    #data-list li {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 0.7rem 1rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.75);
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeIn 0.3s ease;
    }
    #data-list li .label { font-weight: 600; color: #ffd200; }
    #data-list li .time  { font-size: 0.75rem; color: rgba(255,255,255,0.35); }

    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

    footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="badge">🚀 AutoSkill 테스트</div>
  <h1>GitHub + Firebase 연동</h1>
  <p class="sub">데이터를 입력하고 Firestore에 저장해보세요</p>

  <div class="form-group">
    <label for="inputName">이름 / 항목</label>
    <input type="text" id="inputName" placeholder="예: 홍길동" />
  </div>
  <div class="form-group">
    <label for="inputNote">메모</label>
    <textarea id="inputNote" placeholder="저장할 내용을 입력하세요..."></textarea>
  </div>

  <button class="btn btn-primary" id="btnSave" onclick="handleSave()">
    🔥 Firestore에 저장
  </button>
  <button class="btn btn-secondary" onclick="handleLoad()">
    📥 저장된 데이터 불러오기
  </button>

  <div id="status"></div>

  <hr class="divider">

  <h2>📋 저장된 데이터</h2>
  <ul id="data-list">
    <li style="justify-content:center; color:rgba(255,255,255,0.3);">데이터가 없습니다</li>
  </ul>
</div>

<footer>AutoSkill v1.0 · breadang-pixel · GitHub Pages + Firebase Firestore</footer>

<script>
  // ── UI 헬퍼 ───────────────────────────────────────────────────
  function showStatus(msg, type = "loading") {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className   = type;
    el.style.display = "block";
  }

  function renderList(items) {
    const ul = document.getElementById("data-list");
    if (!items.length) {
      ul.innerHTML = '<li style="justify-content:center; color:rgba(255,255,255,0.3);">데이터가 없습니다</li>';
      return;
    }
    ul.innerHTML = items.map(item => {
      const ts = item._createdAt?.seconds
        ? new Date(item._createdAt.seconds * 1000).toLocaleString("ko-KR")
        : "방금";
      return `
        <li>
          <div>
            <span class="label">${item.name || "–"}</span>
            <span style="margin-left:0.5rem">${item.note || ""}</span>
          </div>
          <span class="time">${ts}</span>
        </li>`;
    }).join("");
  }

  // ── 저장 ──────────────────────────────────────────────────────
  async function handleSave() {
    const name = document.getElementById("inputName").value.trim();
    const note = document.getElementById("inputNote").value.trim();
    if (!name) { showStatus("⚠️  이름을 입력하세요", "error"); return; }

    showStatus("⏳ Firestore에 저장 중...", "loading");
    try {
      if (typeof window.saveData !== "function") throw new Error("Firebase가 아직 로드되지 않았습니다. 잠시 후 다시 시도하세요.");
      const id = await window.saveData({ name, note });
      showStatus(`✅ 저장 완료! (ID: ${id.slice(0,8)}...)`, "success");
      document.getElementById("inputName").value = "";
      document.getElementById("inputNote").value = "";
      await handleLoad();
    } catch (e) {
      showStatus("❌ 저장 실패: " + e.message, "error");
    }
  }

  // ── 불러오기 ──────────────────────────────────────────────────
  async function handleLoad() {
    showStatus("⏳ 데이터 불러오는 중...", "loading");
    try {
      if (typeof window.loadData !== "function") throw new Error("Firebase가 아직 로드되지 않았습니다.");
      const items = await window.loadData();
      renderList(items);
      showStatus(`✅ ${items.length}건 불러오기 완료`, "success");
    } catch (e) {
      showStatus("❌ 불러오기 실패: " + e.message, "error");
    }
  }

  // ── Enter 키 지원 ─────────────────────────────────────────────
  document.getElementById("inputNote").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && e.ctrlKey) handleSave();
  });
</script>

</body>
</html>
